spring:
  application:
    name: sentinel
  datasource:
    url: ${SENTINEL_POSTGRES_URL:jdbc:postgresql://localhost:5432/sentinel}
    username: ${SENTINEL_POSTGRES_USERNAME:sentinel}
    password: ${SENTINEL_POSTGRES_PASSWORD:sentinel}
  data:
    redis:
      host: ${SENTINEL_REDIS_HOST:localhost}
      port: ${SENTINEL_REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${SENTINEL_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    admin:
      auto-create: true
    template:
      observation-enabled: true
    listener:
      observation-enabled: true
    consumer:
      auto-offset-reset: earliest
      group-id: sentinel-bootstrap
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: ${SENTINEL_TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${SENTINEL_OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [traceId=%X{traceId:-},spanId=%X{spanId:-}] %logger - %msg%n"

sentinel:
  ingestion:
    webhook:
      sentry:
        signature-validation-enabled: ${SENTINEL_SENTRY_WEBHOOK_SIGNATURE_VALIDATION_ENABLED:false}
        secret: ${SENTINEL_SENTRY_WEBHOOK_SECRET:}
        max-timestamp-skew: ${SENTINEL_SENTRY_WEBHOOK_MAX_TIMESTAMP_SKEW:PT5M}
  analysis:
    llm:
      provider: ${SENTINEL_ANALYSIS_LLM_PROVIDER:bootstrap}
      prompt-version: ${SENTINEL_ANALYSIS_LLM_PROMPT_VERSION:openai-v1}
      prompt-rollout:
        canary-version: ${SENTINEL_ANALYSIS_LLM_PROMPT_CANARY_VERSION:}
        canary-percentage: ${SENTINEL_ANALYSIS_LLM_PROMPT_CANARY_PERCENTAGE:0}
        tenant-overrides: {}
      prompt-templates:
        - version: openai-v1
          system-resource: classpath:prompts/openai-v1/system.txt
          user-resource: classpath:prompts/openai-v1/user.txt
        - version: openai-v2
          system-resource: classpath:prompts/openai-v2/system.txt
          user-resource: classpath:prompts/openai-v2/user.txt
      openai:
        api-base-url: ${SENTINEL_OPENAI_API_BASE_URL:https://api.openai.com}
        api-key: ${SENTINEL_OPENAI_API_KEY:}
        model: ${SENTINEL_OPENAI_MODEL:gpt-4.1-mini}
        temperature: ${SENTINEL_OPENAI_TEMPERATURE:0.2}
    retry:
      max-attempts: ${SENTINEL_ANALYSIS_RETRY_MAX_ATTEMPTS:3}
      initial-backoff: ${SENTINEL_ANALYSIS_RETRY_INITIAL_BACKOFF:PT0.2S}
      multiplier: ${SENTINEL_ANALYSIS_RETRY_MULTIPLIER:2.0}
      max-backoff: ${SENTINEL_ANALYSIS_RETRY_MAX_BACKOFF:PT2S}
    failure-routing:
      channels: ${SENTINEL_ANALYSIS_FAILURE_ROUTING_CHANNELS:telegram}
  classification:
    deduplication:
      enabled: ${SENTINEL_CLASSIFICATION_DEDUPLICATION_ENABLED:true}
      ttl: ${SENTINEL_CLASSIFICATION_DEDUPLICATION_TTL:PT30M}
      key-prefix: ${SENTINEL_CLASSIFICATION_DEDUPLICATION_KEY_PREFIX:sentinel:classification:dedup}
  delivery:
    default-channels: ${SENTINEL_DELIVERY_DEFAULT_CHANNELS:slack}
    slack:
      api-base-url: ${SENTINEL_SLACK_API_BASE_URL:https://slack.com/api}
      bot-token: ${SENTINEL_SLACK_BOT_TOKEN:}
      default-channel: ${SENTINEL_SLACK_DEFAULT_CHANNEL:}
    telegram:
      api-base-url: ${SENTINEL_TELEGRAM_API_BASE_URL:https://api.telegram.org}
      bot-token: ${SENTINEL_TELEGRAM_BOT_TOKEN:}
      chat-id: ${SENTINEL_TELEGRAM_CHAT_ID:}
  dead-letter:
    replay:
      max-replay-attempts: ${SENTINEL_DEAD_LETTER_REPLAY_MAX_REPLAY_ATTEMPTS:3}
      cooldown: ${SENTINEL_DEAD_LETTER_REPLAY_COOLDOWN:PT5M}
      require-operator-note: ${SENTINEL_DEAD_LETTER_REPLAY_REQUIRE_OPERATOR_NOTE:true}
      failure-alert:
        enabled: ${SENTINEL_DEAD_LETTER_REPLAY_FAILURE_ALERT_ENABLED:true}
        threshold: ${SENTINEL_DEAD_LETTER_REPLAY_FAILURE_ALERT_THRESHOLD:3}
        window: ${SENTINEL_DEAD_LETTER_REPLAY_FAILURE_ALERT_WINDOW:PT30M}
        channels: ${SENTINEL_DEAD_LETTER_REPLAY_FAILURE_ALERT_CHANNELS:telegram}
