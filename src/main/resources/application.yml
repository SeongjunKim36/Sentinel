spring:
  application:
    name: sentinel
  datasource:
    url: ${SENTINEL_POSTGRES_URL:jdbc:postgresql://localhost:5432/sentinel}
    username: ${SENTINEL_POSTGRES_USERNAME:sentinel}
    password: ${SENTINEL_POSTGRES_PASSWORD:sentinel}
  data:
    redis:
      host: ${SENTINEL_REDIS_HOST:localhost}
      port: ${SENTINEL_REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${SENTINEL_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    admin:
      auto-create: true
    consumer:
      auto-offset-reset: earliest
      group-id: sentinel-bootstrap
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger - %msg%n"

sentinel:
  delivery:
    default-channels: ${SENTINEL_DELIVERY_DEFAULT_CHANNELS:slack}
    slack:
      api-base-url: ${SENTINEL_SLACK_API_BASE_URL:https://slack.com/api}
      bot-token: ${SENTINEL_SLACK_BOT_TOKEN:}
      default-channel: ${SENTINEL_SLACK_DEFAULT_CHANNEL:}
    telegram:
      api-base-url: ${SENTINEL_TELEGRAM_API_BASE_URL:https://api.telegram.org}
      bot-token: ${SENTINEL_TELEGRAM_BOT_TOKEN:}
      chat-id: ${SENTINEL_TELEGRAM_CHAT_ID:}
